<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KenyaLensIQ Widget</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background: #fff; }
    .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .logo { height: 24px; }
    .title { font-size: 16px; font-weight: 600; }
    .footer { font-size: 11px; color: #6b7280; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      {% if logo %}
        <img src="{{logo}}" class="logo" alt="logo">
      {% endif %}
      <div class="title">KenyaLensIQ: {{request.query_params.get('module', 'core')}} Data</div>
    </div>
    
    <canvas id="lensiqChart"></canvas>
    
    <div class="footer">
      Powered by KenyaLensIQ • Last updated {{datetime.utcnow().strftime('%b %d, %Y')}}
    </div>
  </div>

  <script>
    const data = {{ data | tojson }};
    
    new Chart(document.getElementById('lensiqChart'), {
      type: 'bar',
      data: {
        labels: data.by_sector.map(x => x.name),
        datasets: [{
          label: 'Business Count',
          data: data.by_sector.map(x => x.count),
          backgroundColor: '#2563eb'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  </script>
</body>
</html>

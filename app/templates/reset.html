<!DOCTYPE html><html><head><title>Reset Password</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#F5F7FA] flex items-center justify-center h-screen"><div class="bg-white p-8 rounded-2xl w-96"><h1 class="text-2xl font-bold mb-4">Reset Password</h1><form id="resetForm"><input type="hidden" name="token" value="{{ token }}"><input name="new_password" type="password" class="w-full p-3 border rounded-lg mb-3" placeholder="New Password"><button class="bg-[#14B8A6] text-white w-full p-3 rounded-lg">Reset</button></form><p id="msg" class="mt-3"></p></div><script>document.getElementById('resetForm').onsubmit=async e=>{e.preventDefault();const res=await fetch('/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});document.getElementById('msg').innerText=(await res.json()).message}</script></body></html>

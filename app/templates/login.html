{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-16 p-8 bg-white rounded-xl shadow-lg border border-gray-200">
<h2 class="text-2xl font-bold text-[#0A1F44]">Login to EvidLens</h2>
{% if error %}<p class="text-red-500 mt-2">{{ error }}</p>{% endif %}
<form action="/do-login" method="post" class="mt-6 space-y-4">
<input name="email" type="email" placeholder="Email" required class="w-full border-gray-300 p-3 rounded-lg">
<input name="password" type="password" placeholder="Password" required class="w-full border-gray-300 p-3 rounded-lg">
<button class="w-full bg-[#14B8A6] text-white p-3 rounded-lg font-semibold hover:bg-[#0A9C8E]">Login</button>
</form>
<p class="mt-4 text-center">No account? <a href="/signup" class="text-[#0A1F44] font-semibold">Sign up</a></p>
</div>
{% endblock %}

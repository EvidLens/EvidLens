<!DOCTYPE html>
<html>
<head>
<title>Login - EvidLens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F7FA] flex items-center justify-center min-h-screen">
<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
  <div class="text-center mb-6">
    <h1 class="font-bold text-3xl"><span style="color:#0A1F44">Evid</span><span style="color:#14B8A6">Lens</span></h1>
    <p class="text-gray-500">Decision Intelligence for Kenya</p>
  </div>
  
  <form method="POST" action="/do-login" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-[#0A1F44] mb-2">Email</label>
      <input type="email" name="email" required class="w-full p-3 border rounded-lg">
    </div>
    <div>
      <label class="block text-sm font-semibold text-[#0A1F44] mb-2">Password</label>
      <input type="password" name="password" required class="w-full p-3 border rounded-lg">
    </div>
    <button class="w-full bg-[#14B8A6] text-white p-3 rounded-lg font-bold hover:opacity-90">Login</button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-4">Demo: admin@evid.com / admin123</p>
</div>
</body>
</html>

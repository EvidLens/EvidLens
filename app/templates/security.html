<!DOCTYPE html><html><head><title>Security - EvidLens</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#F5F7FA]"><div class="max-w-4xl mx-auto p-6 space-y-6"><div class="bg-white p-6 rounded-2xl"><h1 class="text-2xl font-bold text-[#0A1F44] mb-4">Profile & Preferences</h1><form id="profileForm" class="space-y-3"><input name="full_name" value="{{ current_user.full_name }}" class="w-full p-3 border rounded-lg"><input name="phone" value="{{ current_user.phone }}" class="w-full p-3 border rounded-lg"><select name="theme" class="w-full p-3 border rounded-lg"><option value="light">Light</option><option value="dark">Dark</option></select><select name="language" class="w-full p-3 border rounded-lg"><option value="en">English</option><option value="sw">Kiswahili</option></select><button class="bg-[#14B8A6] text-white px-4 py-2 rounded-lg">Save</button></form><p id="profileMsg"></p></div><div class="bg-white p-6 rounded-2xl"><h1 class="text-2xl font-bold text-[#0A1F44] mb-4">Change Password</h1><form id="passwordForm" class="space-y-3"><input name="old_password" type="password" class="w-full p-3 border rounded-lg" placeholder="Current Password"><input name="new_password" type="password" class="w-full p-3 border rounded-lg" placeholder="New Password"><button class="bg-[#F59E0B] text-white px-4 py-2 rounded-lg">Update</button></form><p id="passMsg"></p></div></div><script>document.getElementById('profileForm').onsubmit=async e=>{e.preventDefault();const res=await fetch('/auth/update-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});document.getElementById('profileMsg').innerText=(await res.json()).message};document.getElementById('passwordForm').onsubmit=async e=>{e.preventDefault();const res=await fetch('/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});document.getElementById('passMsg').innerText=(await res.json()).message||(await res.json()).detail};</script></body></html>

<!DOCTYPE html>
<html>
<head>
<title>EvidLens Pricing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<section class="py-16"><div class="max-w-7xl mx-auto px-4">
<h1 class="text-4xl font-bold text-center">Choose Your Plan</h1>
<p class="text-center text-gray-600 mt-2">Kenya-First Data. 9 Lanes. 19 Modules. Exportable Reports</p>
<div class="grid md:grid-cols-3 lg:grid-cols-6 gap-6 mt-12" id="plans-grid">
</div>
<div class="mt-12 text-center">
<h2 class="text-xl font-bold">Add-Ons</h2>
<p class="text-gray-600">Slack Alerts, CRM Sync, API Access, Analyst WhatsApp</p>
<h2 class="mt-4 text-xl font-bold">À La Carte</h2>
<p class="text-gray-600">Benchmark Report, Due Diligence, B2B Lead Lists</p>
</div>
</div></section>
<script>
const plans = [
  {name: "FREE", price: "KES 0", sub: "", features: ["3 Searches/mo", "1 Report/mo"]},
  {name: "SME STARTER", price: "KES 500", sub: "per Report", features: ["Pay as you go", "Full PDF Report"]},
  {name: "SME PRO", price: "KES 2,000", sub: "/month", features: ["10 Reports", "50 Searches", "Email Support"]},
  {name: "PROFESSIONAL", price: "KES 5,000", sub: "/month", features: ["30 Reports", "200 Searches", "API Access"]},
  {name: "BUSINESS", price: "KES 15,000", sub: "/month", features: ["100 Reports", "Unlimited Searches"]},
  {name: "ENTERPRISE", price: "KES 40,000+", sub: "/month", features: ["Unlimited", "Custom Data", "Dedicated Analyst"]},
];

const grid = document.getElementById('plans-grid');
plans.forEach(p=>{
  const isPopular = p.name === "PROFESSIONAL";
  const isEnterprise = p.name === "ENTERPRISE";
  grid.innerHTML += `
  <div class="bg-white p-6 rounded-2xl shadow ${isPopular ? 'border-4 border-[#14B8A6]' : ''} ${isEnterprise ? 'border-2 border-[#F59E0B]' : ''}">
    <h3 class="font-bold text-lg">${p.name}</h3>
    <p class="text-2xl font-bold mt-2">${p.price}<span class="text-sm font-normal text-gray-500">${p.sub}</span></p>
    <ul class="text-sm mt-4 space-y-2">
      ${p.features.map(f=>`<li>✓ ${f}</li>`).join('')}
    </ul>
    <button onclick="checkout('${p.name}')" class="mt-4 w-full ${isEnterprise ? 'bg-[#F59E0B]' : 'bg-[#14B8A6]'} text-white py-2 rounded font-semibold">
      ${isEnterprise ? 'Contact Sales' : 'Get Started'}
    </button>
  </div>`
})

function checkout(plan){
  if(plan === "ENTERPRISE") window.location.href = "/contact";
  else fetch('/api/checkout', {method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({plan, billing: 'monthly'})})
  .then(r=>r.json()).then(d=>alert(d.mpesa_prompt))
}
</script></body></html>

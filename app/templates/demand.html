<!DOCTYPE html>
<html>
<head>
    <title>Demand Radar</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f7fa; }
        h1 { color: #1e3a8a; }
        table { width: 100%; background: white; border-collapse: collapse; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #2563eb; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <h1>📈 Live Demand Radar</h1>
    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>County</th>
                <th>Demand Score</th>
                <th>Market Size</th>
            </tr>
        </thead>
        <tbody>
            {% for d in demand %}
            <tr>
                <td><b>{{d.product_name}}</b></td>
                <td>{{d.county}}</td>
                <td>{{d.demand_score}}</td>
                <td>KES {{ "{:,.0f}".format(d.market_size_kes) }}</td>
            </tr>
            {% else %}
            <tr><td colspan="4">No demand data yet</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

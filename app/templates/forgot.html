<!DOCTYPE html><html><head><title>Forgot Password</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#F5F7FA] flex items-center justify-center h-screen"><div class="bg-white p-8 rounded-2xl w-96"><h1 class="text-2xl font-bold mb-4">Forgot Password</h1><form id="forgotForm"><input name="email" type="email" class="w-full p-3 border rounded-lg mb-3" placeholder="Email"><button class="bg-[#14B8A6] text-white w-full p-3 rounded-lg">Send Reset Link</button></form><p id="msg" class="mt-3"></p></div><script>document.getElementById('forgotForm').onsubmit=async e=>{e.preventDefault();const res=await fetch('/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))});document.getElementById('msg').innerText=(await res.json()).message}</script></body></html>
